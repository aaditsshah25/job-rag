name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — syntax & import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Syntax check
        run: python -m py_compile backend.py && echo "backend.py OK"

      - name: Import check (stub env vars)
        env:
          OPENAI_API_KEY: stub
          PINECONE_API_KEY: stub
          PINECONE_INDEX: stub
          JOBMATCH_API_KEY: stub
        run: python -c "import backend; print('imports OK')"

  frontend:
    name: Frontend — static file check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f frontend/index.html && echo "index.html OK"
          test -f frontend/app.js && echo "app.js OK"
          test -f frontend/config.js && echo "config.js OK"
